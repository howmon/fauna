<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Region Capture</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; cursor: crosshair; user-select: none; -webkit-app-region: no-drag; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #hint {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: #fff; font-family: -apple-system, sans-serif;
      font-size: 13px; padding: 8px 16px; border-radius: 8px; pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hint">Click and drag to select a region · Escape to cancel</div>
  <canvas id="canvas"></canvas>
  <script>
    const { ipcRenderer } = require('electron');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let screenshot = null;
    let startX = 0, startY = 0, endX = 0, endY = 0;
    let dragging = false;

    // Receive screenshot from main process
    ipcRenderer.on('set-screenshot', (event, dataUrl) => {
      const img = new Image();
      img.onload = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        screenshot = img;
        draw();
      };
      img.src = dataUrl;
    });

    function draw() {
      if (!screenshot) return;
      ctx.drawImage(screenshot, 0, 0, canvas.width, canvas.height);
      // Darken overlay
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (dragging || (endX !== startX && endY !== startY)) {
        const x = Math.min(startX, endX);
        const y = Math.min(startY, endY);
        const w = Math.abs(endX - startX);
        const h = Math.abs(endY - startY);

        // Clear selection area (show original image)
        ctx.drawImage(screenshot, x, y, w, h, x, y, w, h);

        // Selection border
        ctx.strokeStyle = '#00aaff';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 3]);
        ctx.strokeRect(x, y, w, h);
        ctx.setLineDash([]);

        // Dimensions label
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(x, y - 22, 90, 20);
        ctx.fillStyle = '#fff';
        ctx.font = '12px -apple-system, sans-serif';
        ctx.fillText(`${w} × ${h}`, x + 4, y - 6);
      }
    }

    canvas.addEventListener('mousedown', (e) => {
      startX = e.clientX; startY = e.clientY;
      endX = startX; endY = startY;
      dragging = true;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      endX = e.clientX; endY = e.clientY;
      draw();
    });

    canvas.addEventListener('mouseup', (e) => {
      if (!dragging) return;
      dragging = false;
      endX = e.clientX; endY = e.clientY;

      const x = Math.min(startX, endX);
      const y = Math.min(startY, endY);
      const w = Math.abs(endX - startX);
      const h = Math.abs(endY - startY);

      if (w < 5 || h < 5) {
        // Too small — cancel
        ipcRenderer.send('capture-region-result', null);
        return;
      }

      ipcRenderer.send('capture-region-result', { x, y, width: w, height: h });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        ipcRenderer.send('capture-region-result', null);
      }
    });
  </script>
</body>
</html>
