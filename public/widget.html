<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fauna Tasks</title>
<link rel="stylesheet" href="css/widget.css">
</head>
<body>
  <!-- Title bar (draggable) -->
  <div id="titlebar">
    <span class="titlebar-label">Tasks</span>
    <div class="titlebar-btns">
      <button id="btn-pin" class="tb-btn" title="Pin on top">📌</button>
      <button id="btn-add" class="tb-btn" title="Quick add task">＋</button>
      <button id="btn-close" class="tb-btn" title="Hide widget">✕</button>
    </div>
  </div>

  <!-- Quick-add bar (hidden by default) -->
  <div id="quick-add" class="hidden">
    <input id="qa-title" type="text" placeholder="Task title…" autocomplete="off">
    <input id="qa-desc" type="text" placeholder="Description (optional)" autocomplete="off">
    <div class="qa-row">
      <select id="qa-sched">
        <option value="manual">Manual</option>
        <option value="once">Once</option>
        <option value="recurring">Recurring</option>
      </select>
      <input id="qa-at" type="datetime-local" class="hidden">
      <input id="qa-cron" type="text" placeholder="cron" class="hidden">
      <button id="qa-submit">Add</button>
    </div>
  </div>

  <!-- Task list -->
  <div id="task-list"></div>

  <!-- Empty state -->
  <div id="empty-state" class="hidden">
    <div class="empty-icon">✓</div>
    <div class="empty-text">No tasks yet</div>
  </div>

  <script src="js/widget.js"></script>
</body>
</html>
