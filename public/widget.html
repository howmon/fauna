<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fauna Automations</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/widget.css">
</head>
<body>

  <!-- Title bar (draggable) -->
  <div id="titlebar">
    <div class="titlebar-left">
      <i class="ti ti-bolt titlebar-icon"></i>
      <span class="titlebar-label">Automations</span>
    </div>
    <div class="titlebar-btns">
      <button id="btn-new"       class="tb-btn" title="New automation"><i class="ti ti-plus"></i></button>
      <button id="btn-open-app"  class="tb-btn" title="Open in Fauna"><i class="ti ti-layout-sidebar"></i></button>
      <button id="btn-pin"       class="tb-btn" title="Pin on top"><i class="ti ti-pin"></i></button>
      <button id="btn-close"     class="tb-btn" title="Hide widget"><i class="ti ti-x"></i></button>
    </div>
  </div>

  <!-- Quick-add bar (slides down) -->
  <div id="quick-add" class="hidden">
    <input id="qa-title"  type="text" placeholder="Automation title…" autocomplete="off">
    <textarea id="qa-desc" rows="2" placeholder="What should it do?"></textarea>
    <div class="qa-row">
      <div class="qa-kind-tabs">
        <button class="qa-kind-tab active" data-kind="cron"><i class="ti ti-clock"></i> Cron</button>
        <button class="qa-kind-tab" data-kind="pipeline"><i class="ti ti-git-branch"></i> Pipeline</button>
        <button class="qa-kind-tab" data-kind="heartbeat"><i class="ti ti-heart-rate-monitor"></i> Heartbeat</button>
      </div>
    </div>
    <div class="qa-row qa-sched-row" id="qa-sched-row">
      <select id="qa-sched">
        <option value="manual">Run manually</option>
        <option value="once">Run once</option>
        <option value="recurring">Recurring (cron)</option>
      </select>
      <input id="qa-at"   type="datetime-local" class="hidden">
      <input id="qa-cron" type="text" placeholder="e.g. 0 9 * * 1-5" class="hidden">
    </div>
    <div class="qa-perms">
      <label class="qa-perm"><input type="checkbox" id="qa-perm-shell" checked><i class="ti ti-terminal-2"></i><span>Shell</span></label>
      <label class="qa-perm"><input type="checkbox" id="qa-perm-browser"><i class="ti ti-world-www"></i><span>Browser</span></label>
      <label class="qa-perm"><input type="checkbox" id="qa-perm-figma"><i class="ti ti-brand-figma"></i><span>Figma</span></label>
    </div>
    <div class="qa-footer">
      <button id="qa-cancel">Cancel</button>
      <button id="qa-submit" class="primary">Create</button>
    </div>
  </div>

  <!-- Tabs: Active / Recent -->
  <div id="tab-bar">
    <button class="tab-btn active" data-tab="active">Active</button>
    <button class="tab-btn" data-tab="recent">Recent</button>
  </div>

  <!-- Task list -->
  <div id="task-list"></div>

  <!-- Empty state -->
  <div id="empty-state" class="hidden">
    <i class="ti ti-clock-plus empty-icon"></i>
    <div class="empty-text">No automations</div>
    <button class="empty-cta" id="btn-empty-new">
      <i class="ti ti-plus"></i> New automation
    </button>
  </div>

  <script src="js/widget.js"></script>
</body>
</html>
