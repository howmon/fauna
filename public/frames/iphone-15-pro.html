<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui;
  }
  .device {
    position: relative;
    width: 393px;
    height: 852px;
    background: #0a0a0a;
    border-radius: 54px;
    box-shadow:
      0 0 0 2px #3a3a3a,
      0 0 0 4px #1a1a1a,
      0 30px 80px rgba(0,0,0,0.7),
      inset 0 0 0 1px #3a3a3a;
    overflow: hidden;
  }
  /* Dynamic island */
  .dynamic-island {
    position: absolute;
    top: 13px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 37px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
  }
  /* Screen content */
  .screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 54px;
    overflow: hidden;
    background: #fff;
  }
  .screen iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 54px;
  }
  /* Side buttons */
  .btn-silent {
    position: absolute;
    left: -3px;
    top: 160px;
    width: 3px;
    height: 32px;
    background: #3a3a3a;
    border-radius: 2px 0 0 2px;
  }
  .btn-vol-up {
    position: absolute;
    left: -3px;
    top: 216px;
    width: 3px;
    height: 64px;
    background: #3a3a3a;
    border-radius: 2px 0 0 2px;
  }
  .btn-vol-down {
    position: absolute;
    left: -3px;
    top: 296px;
    width: 3px;
    height: 64px;
    background: #3a3a3a;
    border-radius: 2px 0 0 2px;
  }
  .btn-power {
    position: absolute;
    right: -3px;
    top: 232px;
    width: 3px;
    height: 80px;
    background: #3a3a3a;
    border-radius: 0 2px 2px 0;
  }
  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: rgba(0,0,0,0.3);
    border-radius: 3px;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="device">
  <div class="btn-silent"></div>
  <div class="btn-vol-up"></div>
  <div class="btn-vol-down"></div>
  <div class="btn-power"></div>
  <div class="dynamic-island"></div>
  <div class="screen">
    <iframe id="content-frame" src="about:blank" sandbox="allow-scripts allow-forms allow-popups allow-modals"></iframe>
  </div>
  <div class="home-indicator"></div>
</div>
<script>
  // When embedded, parent sets content via postMessage: { type: 'setContent', html: '...' }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'setContent') {
      var frame = document.getElementById('content-frame');
      frame.srcdoc = e.data.html;
    }
  });
</script>
</body>
</html>
