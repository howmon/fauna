<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Fauna Voice Capture</title>
  <style>
    html, body { background: #000; color: #ddd; font: 12px ui-monospace, monospace; margin: 0; padding: 8px; }
    .row { display: flex; gap: 12px; }
    .lvl { width: 200px; height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
    .lvl > div { height: 100%; width: 0; background: linear-gradient(90deg,#3df,#0f8); transition: width .05s linear; }
    .state { padding: 2px 6px; border-radius: 3px; background: #222; }
    .state.live { background: #064; }
    .state.speak { background: #840; }
    .err { color: #f66; }
  </style>
</head>
<body>
  <div class="row">
    <span id="state" class="state">init</span>
    <div class="lvl"><div id="bar"></div></div>
    <span id="info"></span>
  </div>
  <div id="err" class="err"></div>
  <script src="./js/audio-capture.js"></script>
</body>
</html>
