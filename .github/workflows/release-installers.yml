name: Release Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (for example v2.0.1)"
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-mac-arm64:
    name: Build macOS DMG (arm64) - Fauna + FaunaMCP
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare relay dependencies
        run: npm run prepare:relay

      - name: Build whisper binary
        run: npm run build:whisper

      - name: Build macOS arm64 DMG
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: npx electron-builder --mac dmg --arm64 --publish never

      - name: Notarize and staple Fauna macOS arm64 DMG
        if: ${{ secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
        run: |
          for f in dist/*.dmg; do
            xcrun notarytool submit "$f" --wait --apple-id "${{ secrets.APPLE_ID }}" --team-id "${{ secrets.APPLE_TEAM_ID }}" --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            xcrun stapler staple -v "$f"
          done

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: fauna-mac-arm64-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Install FaunaMCP dependencies
        run: npm --prefix faunaMCP-main ci

      - name: Build FaunaMCP macOS arm64 DMG
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: npm --prefix faunaMCP-main run dist:mac:arm64

      - name: Notarize and staple FaunaMCP macOS arm64 DMG
        if: ${{ secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
        run: |
          for f in faunaMCP-main/dist/*.dmg; do
            xcrun notarytool submit "$f" --wait --apple-id "${{ secrets.APPLE_ID }}" --team-id "${{ secrets.APPLE_TEAM_ID }}" --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            xcrun stapler staple -v "$f"
          done

      - name: Upload FaunaMCP macOS arm64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: faunamcp-mac-arm64-dmg
          path: faunaMCP-main/dist/*.dmg
          if-no-files-found: error

  build-mac-x64:
    name: Build macOS DMG (x64) - Fauna + FaunaMCP
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare relay dependencies
        run: npm run prepare:relay

      - name: Build whisper binary
        run: npm run build:whisper

      - name: Build macOS x64 DMG
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: npx electron-builder --mac dmg --x64 --publish never

      - name: Notarize and staple Fauna macOS x64 DMG
        if: ${{ secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
        run: |
          for f in dist/*.dmg; do
            xcrun notarytool submit "$f" --wait --apple-id "${{ secrets.APPLE_ID }}" --team-id "${{ secrets.APPLE_TEAM_ID }}" --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            xcrun stapler staple -v "$f"
          done

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: fauna-mac-x64-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Install FaunaMCP dependencies
        run: npm --prefix faunaMCP-main ci

      - name: Build FaunaMCP macOS x64 DMG
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: npm --prefix faunaMCP-main run dist:mac:x64

      - name: Notarize and staple FaunaMCP macOS x64 DMG
        if: ${{ secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
        run: |
          for f in faunaMCP-main/dist/*.dmg; do
            xcrun notarytool submit "$f" --wait --apple-id "${{ secrets.APPLE_ID }}" --team-id "${{ secrets.APPLE_TEAM_ID }}" --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            xcrun stapler staple -v "$f"
          done

      - name: Upload FaunaMCP macOS x64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: faunamcp-mac-x64-dmg
          path: faunaMCP-main/dist/*.dmg
          if-no-files-found: error

  build-win-x64:
    name: Build Windows EXE (x64) - Fauna + FaunaMCP
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare relay dependencies
        run: npm run prepare:relay

      - name: Build whisper binary
        run: npm run build:whisper

      - name: Build Windows x64 NSIS installer
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: fauna-win-x64-exe
          path: dist/*.exe
          if-no-files-found: error

      - name: Install FaunaMCP dependencies
        run: npm --prefix faunaMCP-main ci

      - name: Install FaunaMCP relay sub-dependencies
        run: npm --prefix faunaMCP-main run install:relays

      - name: Build FaunaMCP Windows x64 NSIS installer
        run: npm --prefix faunaMCP-main run dist:win -- --x64

      - name: Upload FaunaMCP Windows x64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: faunamcp-win-x64-exe
          path: faunaMCP-main/dist/*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs:
      - build-mac-arm64
      - build-mac-x64
      - build-win-x64

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
          append_body: true
          body: |
            Automated installer artifacts:
            Fauna:
            - macOS DMG (arm64)
            - macOS DMG (x64)
            - Windows EXE (x64)

            FaunaMCP:
            - macOS DMG (arm64)
            - macOS DMG (x64)
            - Windows EXE (x64)
