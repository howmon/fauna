          for f in dist/*.dmg; do
            echo "Submitting $f for notarization..."
            submission_json="$(xcrun notarytool submit "$f" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --output-format json)"
            submission_id="$(printf '%s' "$submission_json" | /usr/bin/python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"
            echo "Submission ID: $submission_id"

            ok=0
            for attempt in 1 2 3; do
              if xcrun notarytool wait "$submission_id" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --timeout 20m; then
                ok=1
                break
              fi
              if [[ "$attempt" -lt 3 ]]; then
                echo "notarytool wait timed out/failed for $f (attempt $attempt). Retrying wait..."
                sleep 20
              fi
            done

            if [[ "$ok" -ne 1 ]]; then
              echo "Notarization wait failed for $f"
              xcrun notarytool log "$submission_id" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
              exit 1
            fi

            xcrun stapler staple -v "$f"
          done

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: fauna-mac-x64-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Install FaunaMCP dependencies
        run: npm --prefix faunaMCP-main ci

      - name: Install FaunaMCP relay sub-dependencies
        run: npm --prefix faunaMCP-main run install:relays

      - name: Build FaunaMCP macOS x64 DMG
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: npm --prefix faunaMCP-main run dist:mac:x64

      - name: Notarize and staple FaunaMCP macOS x64 DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APPLE_TEAM_ID" || -z "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            echo "Notarization secrets missing; skipping FaunaMCP x64 notarization"
            exit 0
          fi
          for f in faunaMCP-main/dist/*.dmg; do
            echo "Submitting $f for notarization..."
            submission_json="$(xcrun notarytool submit "$f" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --output-format json)"
            submission_id="$(printf '%s' "$submission_json" | /usr/bin/python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"
            echo "Submission ID: $submission_id"

            ok=0
            for attempt in 1 2 3; do
              if xcrun notarytool wait "$submission_id" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --timeout 20m; then
                ok=1
                break
              fi
              if [[ "$attempt" -lt 3 ]]; then
                echo "notarytool wait timed out/failed for $f (attempt $attempt). Retrying wait..."
                sleep 20
              fi
            done

            if [[ "$ok" -ne 1 ]]; then
              echo "Notarization wait failed for $f"
              xcrun notarytool log "$submission_id" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
              exit 1
            fi

            xcrun stapler staple -v "$f"
          done

      - name: Upload FaunaMCP macOS x64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: faunamcp-mac-x64-dmg
          path: faunaMCP-main/dist/*.dmg
          if-no-files-found: error

  build-win-x64:
    name: Build Windows EXE (x64) - Fauna + FaunaMCP
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare relay dependencies
        run: npm run prepare:relay

      - name: Build whisper binary
        run: npm run build:whisper

      - name: Build Windows x64 NSIS installer
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: fauna-win-x64-exe
          path: dist/*.exe
          if-no-files-found: error

      - name: Install FaunaMCP dependencies
        run: npm --prefix faunaMCP-main ci

      - name: Install FaunaMCP relay sub-dependencies
        run: npm --prefix faunaMCP-main run install:relays

      - name: Build FaunaMCP Windows x64 NSIS installer
        run: npm --prefix faunaMCP-main run dist:win -- --x64

      - name: Upload FaunaMCP Windows x64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: faunamcp-win-x64-exe
          path: faunaMCP-main/dist/*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs:
      - build-mac-arm64
      - build-mac-x64
      - build-win-x64

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload assets to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.value }}"

          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes "Automated installer artifacts"
          fi

          shopt -s globstar nullglob
          files=(release-assets/**/*.dmg release-assets/**/*.exe)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets found to upload"
            exit 1
          fi

          declare -A unique
          for f in "${files[@]}"; do
            base="$(basename "$f")"
            unique["$base"]="$f"
          done

          uploaded=0
          for base in "${!unique[@]}"; do
            file="${unique[$base]}"
            echo "Uploading $base from $file"
            ok=0
            for attempt in 1 2 3; do
              if gh release upload "$TAG" "$file" --repo "$GITHUB_REPOSITORY" --clobber; then
                ok=1
                uploaded=$((uploaded + 1))
                break
              fi
              if [[ "$attempt" -lt 3 ]]; then
                echo "Upload failed for $base (attempt $attempt). Retrying..."
                sleep 2
              fi
            done
            if [[ "$ok" -ne 1 ]]; then
              echo "Failed to upload $base after retries"
              exit 1
            fi
          done

          echo "Uploaded $uploaded unique assets"
