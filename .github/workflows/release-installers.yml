name: Release Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (for example v2.0.1)"
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-mac-arm64:
    name: Build macOS DMG (arm64) - Fauna + FaunaMCP
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare relay dependencies
        run: npm run prepare:relay

      - name: Build whisper binary
        run: npm run build:whisper

      - name: Build macOS arm64 DMG
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: npx electron-builder --mac dmg --arm64 --publish never

      - name: Notarize and staple Fauna macOS arm64 DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APPLE_TEAM_ID" || -z "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            echo "Notarization secrets missing; skipping Fauna arm64 notarization"
            exit 0
          fi
          for f in dist/*.dmg; do
            echo "Submitting $f for notarization..."
            submission_json="$(xcrun notarytool submit "$f" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --output-format json)"
            submission_id="$(printf '%s' "$submission_json" | /usr/bin/python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"
            echo "Submission ID: $submission_id"

            ok=0
            for attempt in 1 2 3; do
              if xcrun notarytool wait "$submission_id" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --timeout 20m; then
                ok=1
                break
              fi
              if [[ "$attempt" -lt 3 ]]; then
                echo "notarytool wait timed out/failed for $f (attempt $attempt). Retrying wait..."
                sleep 20
              fi
            done

            if [[ "$ok" -ne 1 ]]; then
              echo "Notarization wait failed for $f"
              xcrun notarytool log "$submission_id" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
              exit 1
            fi

            xcrun stapler staple -v "$f"
          done

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: fauna-mac-arm64-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Install FaunaMCP dependencies
        run: npm --prefix faunaMCP-main ci

      - name: Install FaunaMCP relay sub-dependencies
        run: npm --prefix faunaMCP-main run install:relays

      - name: Build FaunaMCP macOS arm64 DMG
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: npm --prefix faunaMCP-main run dist:mac:arm64

      - name: Notarize and staple FaunaMCP macOS arm64 DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APPLE_TEAM_ID" || -z "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            echo "Notarization secrets missing; skipping FaunaMCP arm64 notarization"
            exit 0
          fi
          for f in faunaMCP-main/dist/*.dmg; do
            echo "Submitting $f for notarization..."
            submission_json="$(xcrun notarytool submit "$f" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --output-format json)"
            submission_id="$(printf '%s' "$submission_json" | /usr/bin/python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"
            echo "Submission ID: $submission_id"

            ok=0
            for attempt in 1 2 3; do
              if xcrun notarytool wait "$submission_id" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --timeout 20m; then
                ok=1
                break
              fi
              if [[ "$attempt" -lt 3 ]]; then
                echo "notarytool wait timed out/failed for $f (attempt $attempt). Retrying wait..."
                sleep 20
              fi
            done

            if [[ "$ok" -ne 1 ]]; then
              echo "Notarization wait failed for $f"
              xcrun notarytool log "$submission_id" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
              exit 1
            fi

            xcrun stapler staple -v "$f"
          done

      - name: Upload FaunaMCP macOS arm64 artifact
        uses: actions/upload-artifact@v5
        with:
          name: faunamcp-mac-arm64-dmg
          path: faunaMCP-main/dist/*.dmg
          if-no-files-found: error

  build-mac-x64:
    name: Build macOS DMG (x64) - Fauna + FaunaMCP
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare relay dependencies
        run: npm run prepare:relay

      - name: Build whisper binary
        run: npm run build:whisper

      - name: Build macOS x64 DMG
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: npx electron-builder --mac dmg --x64 --publish never

      - name: Notarize and staple Fauna macOS x64 DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APPLE_TEAM_ID" || -z "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            echo "Notarization secrets missing; skipping Fauna x64 notarization"
            exit 0
