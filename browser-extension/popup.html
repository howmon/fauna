<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fauna Browser Bridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: #0f0f0f;
      color: #e8e8e8;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #1e1e1e;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .header-text { flex: 1; }
    .header-title { font-weight: 600; font-size: 14px; color: #f0f0f0; }
    .header-subtitle { color: #888; font-size: 11px; margin-top: 1px; }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 99px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .status-pill.online  { background: #0d2b1f; border-color: #10b98133; color: #10b981; }
    .status-pill.offline { background: #1a1a1a;  border-color: #2e2e2e;   color: #888; }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .online  .dot { background: #10b981; box-shadow: 0 0 5px #10b98166; }
    .offline .dot { background: #555; }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a1a;
    }
    .section:last-child { border-bottom: none; }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 8px;
    }

    .tab-info {
      background: #161616;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 8px 10px;
    }
    .tab-url  { color: #6366f1; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tab-title{ color: #ccc; font-size: 12px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .btn {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #ddd;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s, border-color 0.15s;
      margin-bottom: 6px;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:hover { background: #242424; border-color: #333; }
    .btn:active { background: #2a2a2a; }
    .btn.primary { background: #1e1b4b; border-color: #4338ca55; color: #a5b4fc; }
    .btn.primary:hover { background: #23206a; border-color: #6366f1aa; }
    .btn .btn-icon { font-size: 14px; width: 16px; text-align: center; flex-shrink: 0; }

    .btn-disabled { opacity: 0.4; pointer-events: none; }

    .feedback {
      min-height: 24px;
      font-size: 11px;
      color: #888;
      padding: 0 16px 10px;
      text-align: center;
      transition: color 0.2s;
    }
    .feedback.ok  { color: #10b981; }
    .feedback.err { color: #f87171; }

    .reconnect-row { display: flex; gap: 6px; align-items: center; }
    .reconnect-btn {
      flex: 1;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #ccc;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
    }
    .reconnect-btn:hover { background: #242424; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✦</div>
    <div class="header-text">
      <div class="header-title">Fauna Bridge</div>
      <div class="header-subtitle">Browser extension</div>
    </div>
    <div class="status-pill offline" id="status-pill">
      <span class="dot"></span>
      <span id="status-text">Offline</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Active Tab</div>
    <div class="tab-info">
      <div class="tab-title" id="tab-title">—</div>
      <div class="tab-url"   id="tab-url">—</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Actions</div>
    <button class="btn primary" id="btn-send-page">
      <span class="btn-icon">&#8594;</span> Send page to Fauna
    </button>
    <button class="btn" id="btn-snapshot">
      <span class="btn-icon">&#9632;</span> Take snapshot
    </button>
    <button class="btn" id="btn-extract-forms">
      <span class="btn-icon">&#8801;</span> Extract form fields
    </button>
  </div>

  <div id="offline-section" class="section" style="display:none">
    <div class="section-label">Connection</div>
    <div class="reconnect-row">
      <button class="reconnect-btn" id="btn-reconnect">↻ Reconnect to Fauna</button>
    </div>
    <div style="color:#555;font-size:11px;margin-top:8px;line-height:1.4">
      Make sure Fauna is running on your Mac.
    </div>
  </div>

  <div class="feedback" id="feedback"></div>

  <script src="popup.js"></script>
</body>
</html>
