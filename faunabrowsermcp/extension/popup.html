<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FaunaBrowserMCP</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 280px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    background: #0f172a;
    color: #e2e8f0;
  }
  .header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid #1e293b;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .title { font-weight: 600; font-size: 14px; }
  .subtitle { font-size: 11px; color: #64748b; margin-top: 1px; }
  .status-row {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #1e293b;
    margin: 10px 10px 0;
    border-radius: 8px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #64748b; flex-shrink: 0;
  }
  .dot.on  { background: #10b981; box-shadow: 0 0 6px #10b981; }
  .dot.off { background: #ef4444; }
  .status-label { font-size: 12px; color: #94a3b8; flex: 1; }
  .tab-info {
    padding: 8px 16px;
    font-size: 11px;
    color: #64748b;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin: 0 10px;
  }
  .section { padding: 10px 16px 4px; }
  .section-title { font-size: 10px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .code-block {
    background: #1e293b;
    border-radius: 6px;
    padding: 8px 10px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px;
    color: #a5b4fc;
    white-space: pre;
    overflow-x: auto;
    line-height: 1.6;
    margin: 0 6px;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .code-block:hover { border-color: #6366f1; }
  .copy-hint { font-size: 10px; color: #475569; text-align: center; padding: 3px 0 6px; }
  .footer {
    padding: 10px 16px;
    display: flex;
    gap: 6px;
    border-top: 1px solid #1e293b;
    margin-top: 6px;
  }
  button {
    flex: 1;
    padding: 6px 0;
    border-radius: 6px;
    border: 1px solid #1e293b;
    background: #1e293b;
    color: #94a3b8;
    font-size: 11px;
    cursor: pointer;
  }
  button:hover { background: #334155; color: #e2e8f0; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">🦋</div>
  <div>
    <div class="title">FaunaBrowserMCP</div>
    <div class="subtitle">Browser ↔ MCP bridge</div>
  </div>
</div>

<div style="height:8px"></div>

<div class="status-row">
  <div class="dot" id="dot"></div>
  <div class="status-label" id="statusLabel">Checking…</div>
</div>

<div class="tab-info" id="tabInfo"></div>

<div class="section">
  <div class="section-title">MCP Config (HTTP)</div>
</div>
<div class="code-block" id="configBlock" title="Click to copy">{
  "mcpServers": {
    "browser": {
      "url": "http://localhost:3341/mcp"
    }
  }
}</div>
<div class="copy-hint" id="copyHint">Click to copy</div>

<div class="footer">
  <button id="btnReconnect">Reconnect</button>
  <button id="btnDocs" onclick="chrome.tabs.create({url:'https://github.com/fauna/faunabrowsermcp'})">Docs ↗</button>
</div>

<script>
function setStatus(connected, tab) {
  const dot   = document.getElementById('dot');
  const label = document.getElementById('statusLabel');
  const info  = document.getElementById('tabInfo');
  if (connected) {
    dot.className = 'dot on';
    label.textContent = 'Connected to FaunaBrowserMCP relay';
    info.textContent  = tab ? `Active: ${tab.title || tab.url}` : '';
  } else {
    dot.className = 'dot off';
    label.textContent = 'Not connected — start FaunaBrowserMCP app';
    info.textContent  = '';
  }
}

chrome.runtime.sendMessage({ type: 'get-status' }, (res) => {
  setStatus(res?.connected || false);
});

chrome.tabs.query({ active: true, currentWindow: true }, ([tab]) => {
  if (tab) document.getElementById('tabInfo').textContent = `Active: ${tab.title || tab.url}`;
});

chrome.runtime.onMessage.addListener((msg) => {
  if (msg.type === 'fauna:status') setStatus(msg.connected);
});

document.getElementById('btnReconnect').addEventListener('click', () => {
  chrome.runtime.sendMessage({ type: 'connect' });
});

document.getElementById('configBlock').addEventListener('click', () => {
  const text = document.getElementById('configBlock').textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copyHint').textContent = '✓ Copied!';
    setTimeout(() => document.getElementById('copyHint').textContent = 'Click to copy', 2000);
  });
});
</script>
</body>
</html>
