<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI Variable','Segoe UI',-apple-system,system-ui,sans-serif; }
  body { background: #1b1b1b; color: #f5f5f5; padding: 16px; height: 100vh; display: flex; flex-direction: column; gap: 12px; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot.connected    { background: #6ccb5f; box-shadow: 0 0 6px #6ccb5faa; }
  .dot.disconnected { background: #f36e6e; }
  .dot.connecting   { background: #f2c661; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .log { flex: 1; overflow-y: auto; font-size: 11px; font-family: 'Cascadia Code','JetBrains Mono','Fira Code',monospace; color: #b4b4b4; display: flex; flex-direction: column; gap: 4px; }
  .log-entry { padding: 3px 6px; border-radius: 4px; background: #242424; word-break: break-all; }
  .log-entry.ok  { border-left: 2px solid #6ccb5f; }
  .log-entry.err { border-left: 2px solid #f36e6e; color: #f36e6e; }
  .log-entry.cmd { border-left: 2px solid #789996; }
  .hint { font-size: 11px; color: #7a7a7a; text-align: center; }
</style>
</head>

  <div class="dot disconnected" id="dot"></div>
  <span id="statusText">Connecting to MCP relay…</span>
</div>

<div class="log" id="log"></div>
<div class="hint">ws://localhost:3335 · MCP tools ready when connected</div>

<script>
const dot        = document.getElementById('dot');
const statusText = document.getElementById('statusText');
const logEl      = document.getElementById('log');

function addLog(text, type) {
  var el = document.createElement('div');
  el.className = 'log-entry ' + (type || '');
  el.textContent = new Date().toLocaleTimeString() + '  ' + text;
  logEl.appendChild(el);
  if (logEl.children.length > 80) logEl.removeChild(logEl.firstChild);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Pending result callbacks (id → resolve) ──────────────────────────────
var pending = {};

// ── WebSocket to MCP server relay ────────────────────────────────────────
var ws, reconnectTimer;

function connect() {
  dot.className = 'dot connecting';
  statusText.textContent = 'Connecting…';

  ws = new WebSocket('ws://localhost:3335');

  ws.onopen = function() {
    dot.className = 'dot connecting';
    statusText.textContent = 'Identifying…';
    addLog('WebSocket connected — requesting file info', 'ok');
    // Ask code.js to (re-)send FILE_INFO so server knows which file this is
    parent.postMessage({ pluginMessage: { type: 'get-file-info' } }, '*');
  };

  ws.onclose = function() {
    dot.className = 'dot disconnected';
    statusText.textContent = 'Disconnected — retrying in 3 s…';
    addLog('Disconnected', 'err');
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = function() {
    addLog('Connection error — is the MCP server running? (npm start in server/)', 'err');
  };

  // Command from MCP server → forward to Figma plugin sandbox
  ws.onmessage = function(event) {
    var cmd;
    try { cmd = JSON.parse(event.data); } catch(e) { return; }
    // progress-log is handled by window.onmessage after postMessage — skip the '▶ type' noise
    if (cmd.type !== 'progress-log') {
      addLog('▶ ' + cmd.type + (cmd.id ? ' [' + cmd.id.slice(-6) + ']' : ''), 'cmd');
    }
    parent.postMessage({ pluginMessage: cmd }, '*');
  };
}

// ── Result from plugin sandbox → forward back to MCP server ─────────────
window.onmessage = function(event) {
  var msg = event.data && event.data.pluginMessage;
  if (!msg) return;

  // Progress log from AI controller — show directly in the log panel
  if (msg.type === 'progress-log') {
    var level = msg.level === 'ok' ? 'ok' : msg.level === 'err' ? 'err' : 'cmd';
    addLog(msg.message, level);
    return;
  }

  // FILE_INFO: send immediately to server (identifies this client)
  if (msg.type === 'FILE_INFO') {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify(msg));
      dot.className = 'dot connected';
      statusText.textContent = msg.fileName + ' · Connected';
      addLog('✓ Identified as "' + msg.fileName + '"', 'ok');
    }
    return;
  }

  // These message types are forwarded to MCP server (buffered there)
  var forward = ['execute-result','console-capture','SELECTION_CHANGE',
                 'apply-token-result','place-result','pages-list','selection-info'];
  if (forward.indexOf(msg.type) !== -1) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
    if (msg.type !== 'console-capture' && msg.type !== 'SELECTION_CHANGE') {
      addLog('◀ ' + msg.type + (msg.placed ? ' placed:' + msg.placed.length : ''), 'ok');
    }
    return;
  }

  // selection-update is local only (legacy, used by Fauna UI)
  if (msg.type === 'selection-update') return;

  // All other results (create-page-layout, edit-layout, etc.) forwarded to server
  addLog('◀ ' + msg.type + (msg.placed ? ' placed:' + msg.placed.length : '') +
         (msg.errors && msg.errors.length ? ' err:' + msg.errors.length : ''), 'ok');
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
};

connect();
</script>
